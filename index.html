<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleTube — Stream from Telegram</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%23dc2626'/><path d='M8 5v14l11-7z' fill='white'/></svg>">
<style>
:root {
  --background: #0a0a0a;
  --foreground: #fafafa;
  --card: #171717;
  --card-foreground: #fafafa;
  --primary: #262626;
  --primary-foreground: #fafafa;
  --secondary: #1f1f1f;
  --secondary-foreground: #fafafa;
  --muted: #262626;
  --muted-foreground: #a3a3a3;
  --accent: #262626;
  --accent-foreground: #fafafa;
  --destructive: #ef4444;
  --border: rgba(255,255,255,0.1);
  --input: rgba(255,255,255,0.15);
  --ring: #a3a3a3;
  --radius: 0.625rem;
  --header-h: 56px;
  --red: #dc2626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--background);
  color: var(--foreground);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

/* ===== APP SHELL ===== */
#app { min-height: 100vh; }

/* ===== HEADER ===== */
.app-header {
  position: sticky; top: 0; z-index: 40;
  height: var(--header-h);
  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1rem; gap: 0.75rem;
}

.header-left { display: flex; align-items: center; gap: 0.75rem; }
.header-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 0.5rem; max-width: 600px; margin: 0 auto; }
.header-right { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }

.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 9999px;
  color: var(--foreground); transition: background 200ms ease;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--muted); }
.icon-btn svg { width: 22px; height: 22px; }

.logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.logo-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--red); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 18px; height: 18px; fill: white; }
.logo-text { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }

.header-search { display: none; width: 100%; max-width: 500px; }
@media (min-width: 640px) { .header-search { display: flex; gap: 0.5rem; align-items: center; } }

.search-input-wrap {
  position: relative; flex: 1; display: flex; align-items: center;
}
.search-input-wrap svg {
  position: absolute; left: 0.875rem; width: 18px; height: 18px;
  color: var(--muted-foreground); pointer-events: none;
}
.search-input {
  width: 100%; height: 40px; padding: 0 1rem 0 2.5rem;
  border-radius: 9999px; border: 1px solid var(--input);
  background: transparent; color: var(--foreground); font-size: 0.875rem;
  outline: none; transition: border-color 200ms ease;
}
.search-input::placeholder { color: var(--muted-foreground); }
.search-input:focus { border-color: var(--ring); }

.mobile-search-row { display: none; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); gap: 0.5rem; }
@media (max-width: 639px) { .mobile-search-row { display: flex; } }

/* ===== USER AVATAR / DROPDOWN ===== */
.avatar-btn {
  width: 32px; height: 32px; border-radius: 9999px;
  background: linear-gradient(135deg, #ef4444, #9333ea);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.875rem; font-weight: 600;
  flex-shrink: 0; cursor: pointer; transition: opacity 200ms ease;
  border: none;
}
.avatar-btn:hover { opacity: 0.9; }

.signin-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  height: 36px; padding: 0 1.25rem; border-radius: 9999px;
  background: var(--red); color: white; font-size: 0.875rem; font-weight: 500;
  transition: opacity 200ms ease;
}
.signin-btn:hover { opacity: 0.9; }
.signin-btn svg { width: 16px; height: 16px; }

.dropdown-wrap { position: relative; }
.dropdown {
  position: absolute; right: 0; top: calc(100% + 8px);
  min-width: 240px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.5rem; z-index: 50;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  opacity: 0; transform: scale(0.95) translateY(-4px);
  pointer-events: none; transition: all 150ms ease;
}
.dropdown.open { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

.dropdown-header { padding: 0.5rem 0.75rem; }
.dropdown-header .name { font-size: 0.875rem; font-weight: 600; }
.dropdown-header .email { font-size: 0.75rem; color: var(--muted-foreground); }

.dropdown-divider { height: 1px; background: var(--border); margin: 0.25rem 0; }

.dropdown-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem 0.75rem; border-radius: 0.5rem; width: 100%;
  font-size: 0.875rem; color: var(--foreground); text-align: left;
  transition: background 150ms ease;
}
.dropdown-item:hover { background: var(--muted); }
.dropdown-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.dropdown-item.destructive { color: var(--destructive); }

/* ===== APP BODY ===== */
.app-body { display: flex; min-height: calc(100vh - var(--header-h)); }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  position: sticky; top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto; overflow-x: hidden;
  transition: width 200ms ease;
  padding: 0.75rem;
}
.sidebar.mini { width: 72px; }
.sidebar.mini .sidebar-full { display: none; }
.sidebar.mini .sidebar-mini { display: flex; }
.sidebar-mini { display: none; flex-direction: column; gap: 0.25rem; }

.sidebar-section { margin-bottom: 0.5rem; }
.sidebar-label {
  padding: 0.5rem 0.75rem; font-size: 0.6875rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted-foreground);
}
.sidebar.mini .sidebar-label { display: none; }

.sidebar-item {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.625rem 0.75rem; border-radius: 0.5rem;
  font-size: 0.875rem; color: var(--foreground);
  transition: background 150ms ease; cursor: pointer;
  width: 100%; text-align: left;
}
.sidebar-item:hover { background: var(--muted); }
.sidebar-item.active { background: var(--muted); font-weight: 500; }
.sidebar-item svg { width: 22px; height: 22px; flex-shrink: 0; }

.sidebar-mini-item {
  display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
  padding: 0.5rem 0; border-radius: 0.5rem; cursor: pointer;
  transition: background 150ms ease; width: 100%;
}
.sidebar-mini-item:hover { background: var(--muted); }
.sidebar-mini-item.active { background: var(--muted); }
.sidebar-mini-item svg { width: 22px; height: 22px; }
.sidebar-mini-item span { font-size: 0.625rem; color: var(--muted-foreground); }

.sidebar-divider { height: 1px; background: var(--border); margin: 0.75rem 0; }
.sidebar.mini .sidebar-divider { margin: 0.5rem 0.25rem; }

.sidebar-info {
  padding: 0.75rem; font-size: 0.75rem; color: var(--muted-foreground);
  line-height: 1.5;
}

/* Mobile sidebar overlay */
@media (max-width: 1023px) {
  .sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: 0;
    z-index: 50; background: var(--background);
    transform: translateX(-100%); transition: transform 200ms ease;
    width: 280px;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar.mini { width: 280px; }
  .sidebar.mini .sidebar-full { display: block; }
  .sidebar.mini .sidebar-mini { display: none; }
  .mobile-backdrop {
    display: none; position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 45;
  }
  .mobile-backdrop.show { display: block; }
}
@media (min-width: 1024px) {
  .mobile-backdrop { display: none !important; }
}

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; min-width: 0; }

/* ===== GENRE CHIPS ===== */
.genre-chips {
  position: sticky; top: var(--header-h); z-index: 30;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem; display: flex; gap: 0.5rem;
  overflow-x: auto;
}
.chip {
  flex-shrink: 0; padding: 0.4rem 0.875rem; border-radius: 9999px;
  font-size: 0.8125rem; font-weight: 500; white-space: nowrap;
  background: var(--muted); color: var(--muted-foreground);
  transition: all 150ms ease; cursor: pointer; border: none;
}
.chip:hover { background: #333; color: var(--foreground); }
.chip.active { background: var(--foreground); color: var(--background); }

/* ===== VIDEO GRID (YouTube‑style) ===== */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2.5rem 1rem;           /* 40px vertical, 16px horizontal – matching YouTube */
  padding: 1.5rem 2rem;
  max-width: 2200px;
  margin: 0 auto;
}

/* ===== VIDEO CARD ===== */
.video-card { cursor: pointer; }
.thumb-container {
  position: relative; aspect-ratio: 16/9; border-radius: 0.75rem;
  overflow: hidden; background: var(--muted);
}
.thumb-container img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 300ms ease;
}
.video-card:hover .thumb-container img { transform: scale(1.05); }

.duration-badge {
  position: absolute; bottom: 0.5rem; right: 0.5rem;
  padding: 0.125rem 0.375rem; border-radius: 0.25rem;
  background: rgba(0,0,0,0.8); color: white; font-size: 0.6875rem;
  font-weight: 500;
}
.views-badge {
  position: absolute; bottom: 0.5rem; left: 0.5rem;
  padding: 0.125rem 0.375rem; border-radius: 0.25rem;
  background: rgba(0,0,0,0.6); color: white; font-size: 0.6875rem;
  opacity: 0; transition: opacity 200ms ease;
}
.video-card:hover .views-badge { opacity: 1; }

.card-meta { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
.channel-avatar {
  width: 36px; height: 36px; border-radius: 9999px; flex-shrink: 0;
  background: linear-gradient(135deg, #ef4444, #9333ea);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.8125rem; font-weight: 600;
}
.card-text { flex: 1; min-width: 0; }
.card-title {
  font-size: 0.875rem; font-weight: 500;
  line-height: 1.25rem;
  height: 2.5rem;               /* forces exactly 2 lines, keeps all cards equal */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 200ms ease;
}
.video-card:hover .card-title { color: var(--muted-foreground); }
.card-channel { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 0.25rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-info { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 0.125rem; }

/* ===== SKELETON ===== */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.skeleton { background: var(--muted); border-radius: 0.5rem; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

.skeleton-card .skeleton-thumb { aspect-ratio: 16/9; border-radius: 0.75rem; }
.skeleton-card .skeleton-meta { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
.skeleton-card .skeleton-avatar { width: 36px; height: 36px; border-radius: 9999px; flex-shrink: 0; }
.skeleton-card .skeleton-lines { flex: 1; }
.skeleton-card .skeleton-line { height: 0.75rem; border-radius: 0.25rem; margin-bottom: 0.375rem; }
.skeleton-card .skeleton-line.short { width: 60%; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500;
  transition: all 200ms ease; border: none; cursor: pointer;
}
.btn-primary { background: var(--foreground); color: var(--background); }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--secondary); color: var(--foreground); }
.btn-secondary:hover { background: #2a2a2a; }
.btn-ghost { background: transparent; color: var(--foreground); }
.btn-ghost:hover { background: var(--muted); }
.btn-destructive-text { background: transparent; color: var(--destructive); }
.btn-destructive-text:hover { background: rgba(239,68,68,0.1); }
.btn-destructive { background: var(--destructive); color: white; }
.btn-destructive:hover { opacity: 0.9; }
.btn-icon-round {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  height: 36px; padding: 0 1rem; border-radius: 9999px;
  background: var(--secondary); color: var(--foreground); font-size: 0.8125rem; font-weight: 500;
  transition: all 200ms ease;
}
.btn-icon-round:hover { background: #2a2a2a; }
.btn-icon-round.active { background: var(--foreground); color: var(--background); }
.btn-icon-round svg { width: 18px; height: 18px; }
.btn-lg { height: 44px; font-size: 0.9375rem; }
.btn-block { width: 100%; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.spinner {
  width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 9999px;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== WATCH PAGE ===== */
.watch-layout {
  display: grid; grid-template-columns: 1fr; gap: 2rem;
  padding: 1.5rem;
}
@media (min-width: 1024px) {
  .watch-layout { grid-template-columns: 1fr 400px; }
}

.video-player-wrap {
  aspect-ratio: 16/9; border-radius: 0.75rem; overflow: hidden;
  background: #000; position: relative;
}
.video-player-wrap video { width: 100%; height: 100%; display: block; }
.video-player-wrap video::-webkit-media-controls-panel { background: rgba(0,0,0,0.7); }

.player-error {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1rem;
  background: #000; color: var(--muted-foreground); text-align: center; padding: 2rem;
}

.watch-title { font-size: 1.125rem; font-weight: 600; margin-top: 1rem; line-height: 1.4; }
@media (min-width: 640px) { .watch-title { font-size: 1.25rem; } }

.watch-actions {
  display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: space-between;
  align-items: center; margin-top: 0.75rem;
}
.watch-views { font-size: 0.8125rem; color: var(--muted-foreground); display: flex; align-items: center; gap: 0.375rem; }
.watch-views svg { width: 16px; height: 16px; }
.watch-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.channel-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.875rem 0; border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border); margin-top: 1rem; gap: 1rem;
}
.channel-row-left { display: flex; align-items: center; gap: 0.75rem; }
.channel-row .channel-avatar { width: 40px; height: 40px; font-size: 0.875rem; }
.channel-row .channel-name { font-size: 0.9375rem; font-weight: 600; }
.channel-row .channel-meta { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 0.125rem; }

.description-box {
  margin-top: 1rem; padding: 0.75rem; border-radius: 0.75rem;
  background: rgba(38,38,38,0.5); font-size: 0.8125rem; line-height: 1.6;
}
.description-text {
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden; white-space: pre-wrap; word-break: break-word;
}
.description-text.expanded { -webkit-line-clamp: unset; }
.desc-toggle {
  margin-top: 0.5rem; font-size: 0.8125rem; font-weight: 500; color: var(--muted-foreground);
}
.desc-toggle:hover { color: var(--foreground); }

.tag-pills { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.625rem; }
.tag-pill {
  padding: 0.25rem 0.625rem; border-radius: 9999px; background: var(--secondary);
  font-size: 0.6875rem; font-weight: 500; color: var(--foreground);
  transition: background 150ms ease; cursor: pointer; text-transform: capitalize;
}
.tag-pill:hover { background: #2a2a2a; }

.stream-info { margin-top: 0.75rem; }
.stream-info-toggle {
  font-size: 0.75rem; color: var(--muted-foreground); display: flex; align-items: center; gap: 0.25rem;
}
.stream-info-toggle:hover { color: var(--foreground); }
.stream-info-toggle svg { width: 14px; height: 14px; transition: transform 200ms ease; }
.stream-info-toggle.open svg { transform: rotate(180deg); }
.stream-info-content {
  margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.5rem;
  background: rgba(0,0,0,0.3); font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 0.6875rem; color: var(--muted-foreground); display: none;
  overflow-x: auto;
}
.stream-info-content.show { display: block; }
.stream-info-content div { margin-bottom: 0.25rem; white-space: nowrap; }
.stream-info-content span { color: var(--foreground); }

/* Watch sidebar */
.watch-sidebar h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
.recommendation-item {
  display: flex; gap: 0.5rem; cursor: pointer; padding: 0.5rem;
  border-radius: 0.5rem; transition: background 150ms ease;
}
.recommendation-item:hover { background: rgba(38,38,38,0.5); }
.rec-thumb {
  width: 160px; flex-shrink: 0; aspect-ratio: 16/9; border-radius: 0.5rem;
  overflow: hidden; background: var(--muted); position: relative;
}
.rec-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rec-thumb .duration-badge { font-size: 0.625rem; padding: 0.0625rem 0.25rem; }
.rec-text { flex: 1; min-width: 0; }
.rec-title {
  font-size: 0.8125rem; font-weight: 500; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.rec-channel { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 0.25rem; }
.rec-info { font-size: 0.75rem; color: var(--muted-foreground); }

/* ===== AUTH PAGES ===== */
body.auth-page .app-header,
body.auth-page .sidebar,
body.auth-page .mobile-backdrop,
body.auth-page .mobile-search-row { display: none !important; }
body.auth-page .app-body { display: block; }
body.auth-page .main-content {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--header-h)); padding: 2rem;
}

.auth-card {
  width: 100%; max-width: 28rem; background: var(--card);
  border: 1px solid var(--border); border-radius: 1rem; padding: 2rem;
}
.auth-card-header { text-align: center; margin-bottom: 1.5rem; }
.auth-card-header .logo { justify-content: center; margin-bottom: 1rem; }
.auth-card-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.auth-card-header p { font-size: 0.875rem; color: var(--muted-foreground); }

.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.375rem; }
.form-input {
  width: 100%; height: 40px; padding: 0 0.75rem;
  border-radius: 0.5rem; border: 1px solid var(--input);
  background: transparent; color: var(--foreground); font-size: 0.875rem;
  outline: none; transition: border-color 200ms ease;
}
.form-input:focus { border-color: var(--ring); }
.form-input::placeholder { color: var(--muted-foreground); }

.form-error {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.625rem 0.75rem; border-radius: 0.5rem;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  color: var(--destructive); font-size: 0.8125rem; margin-bottom: 1rem;
}
.form-error svg { width: 16px; height: 16px; flex-shrink: 0; }

.auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--muted-foreground); }
.auth-footer a { color: var(--foreground); text-decoration: underline; text-underline-offset: 2px; }
.auth-footer a:hover { opacity: 0.8; }

/* ===== HISTORY / MYLIST PAGE ===== */
.list-page { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
.list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem; gap: 1rem;
}
.list-header h1 { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
.list-header h1 svg { width: 24px; height: 24px; }

.list-items { display: flex; flex-direction: column; gap: 0.75rem; }
.list-item {
  display: flex; gap: 1rem; padding: 0.5rem; border-radius: 0.75rem;
  transition: background 150ms ease; position: relative;
}
.list-item:hover { background: rgba(38,38,38,0.5); }
.list-item:hover .list-item-remove { opacity: 1; }

.list-item-thumb {
  width: 240px; flex-shrink: 0; aspect-ratio: 16/9; border-radius: 0.5rem;
  overflow: hidden; background: var(--muted); position: relative; cursor: pointer;
}
@media (max-width: 639px) { .list-item-thumb { width: 160px; } }
.list-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.list-item-thumb .duration-badge { font-size: 0.625rem; padding: 0.0625rem 0.25rem; }

.progress-bar {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--destructive); border-radius: 0 0 0 0.5rem;
}

.list-item-text { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.list-item-title {
  font-size: 0.9375rem; font-weight: 500; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  cursor: pointer;
}
.list-item-title:hover { color: var(--muted-foreground); }
.list-item-channel { font-size: 0.8125rem; color: var(--muted-foreground); margin-top: 0.25rem; }
.list-item-info { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 0.25rem; }

.list-item-remove {
  position: absolute; top: 0.5rem; right: 0.5rem;
  width: 32px; height: 32px; border-radius: 9999px;
  background: rgba(0,0,0,0.7); color: var(--foreground);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 150ms ease;
}
.list-item-remove:hover { background: rgba(0,0,0,0.9); }
.list-item-remove svg { width: 16px; height: 16px; }

/* ===== EMPTY STATE ===== */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 4rem 2rem; text-align: center; gap: 1rem;
}
.empty-state svg { width: 48px; height: 48px; color: var(--muted-foreground); }
.empty-state h2 { font-size: 1.25rem; font-weight: 600; }
.empty-state p { font-size: 0.875rem; color: var(--muted-foreground); max-width: 400px; }

/* ===== SEARCH PAGE ===== */
.search-page { padding: 1.5rem; }
.search-header { margin-bottom: 1.5rem; }
.search-header h1 { font-size: 1.5rem; font-weight: 700; }
.search-header h1 span { color: var(--muted-foreground); font-weight: 400; }

/* ===== TOASTS ===== */
.toasts {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
  display: flex; flex-direction: column; gap: 0.5rem;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem; border-radius: 0.5rem;
  background: var(--foreground); color: var(--background);
  font-size: 0.875rem; font-weight: 500; min-width: 250px; max-width: 400px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  pointer-events: auto;
  animation: toast-in 200ms ease;
}
.toast.error { background: var(--destructive); color: white; }
.toast-close {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  margin-left: auto; opacity: 0.6; cursor: pointer;
}
.toast-close:hover { opacity: 1; }
.toast-close svg { width: 14px; height: 14px; }
@keyframes toast-in { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
.toast.removing { animation: toast-out 200ms ease forwards; }
@keyframes toast-out { to { opacity: 0; transform: translateX(100%); } }

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(0,0,0,0.7); display: none;
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 1rem; padding: 1.5rem; max-width: 400px; width: 100%;
}
.modal h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
.modal p { font-size: 0.875rem; color: var(--muted-foreground); margin-bottom: 1.5rem; }
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

/* ===== LOAD MORE ===== */
.load-more-wrap { display: flex; justify-content: center; padding: 2rem 1.5rem; }

/* ===== UTILITY ===== */
.hidden { display: none !important; }
</style>
</head>

// =================== API CLIENT ===================
async function api(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  if (options.body && typeof options.body === 'object') {
    headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(options.body);
  }

  // ── Fix 11: AbortController timeout on all JSON API calls ──────
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 20000);
  try {
    const res = await fetch(API_BASE_URL + path, { ...options, headers, signal: controller.signal });
    clearTimeout(timeoutId);
    if (res.status === 401) {
      handleUnauthorized();
      throw new Error('Unauthorized');
    }
    if (res.status === 204) return {};
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
    return data;
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('Request timed out — the server may be waking up, try again in a moment');
    if (e.message === 'Unauthorized') throw e;
    if (e.message.includes('Failed to fetch')) throw new Error('Network error — check your connection');
    throw e;
  }
}

function handleUnauthorized() {
  state.token = null;
  state.user = null;
  localStorage.removeItem('teletube_token');
  const hash = location.hash;
  if (!hash.startsWith('#/login') && !hash.startsWith('#/signup')) {
    location.hash = '#/login';
  }
}

// =================== UTILITIES ===================
function formatDuration(s) {
  if (!s || s < 1) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function formatViews(n) {
  if (!n || n === 0) return '0 views';
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B views';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M views';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K views';
  return n + ' views';
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + ' min ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hour' + (Math.floor(diff/3600) > 1 ? 's' : '') + ' ago';
  if (diff < 86400*7) return Math.floor(diff/86400) + ' day' + (Math.floor(diff/86400) > 1 ? 's' : '') + ' ago';
  if (diff < 86400*30) return Math.floor(diff/(86400*7)) + ' week' + (Math.floor(diff/(86400*7)) > 1 ? 's' : '') + ' ago';
  if (diff < 86400*365) return Math.floor(diff/(86400*30)) + ' month' + (Math.floor(diff/(86400*30)) > 1 ? 's' : '') + ' ago';
  return Math.floor(diff/(86400*365)) + ' year' + (Math.floor(diff/(86400*365)) > 1 ? 's' : '') + ' ago';
}

// ✅ Thumbnail fix already correct – uses API_BASE_URL, not window.location.origin
function absoluteUrl(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;

}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Item 5: Global image error handler for retrying thumbnails once before hiding
function handleImgError(img) {
  if (!img.dataset.retry) {
    img.dataset.retry = '1';
    img.src = img.src.split('?')[0] + '?retry=' + Date.now();
  } else {
    img.style.display = 'none';
  }
}

function saveWatchInfo(videoId, position, duration) {
  try {
    const info = JSON.parse(localStorage.getItem('teletube_watch_info') || '{}');
    info[videoId] = { time: new Date().toISOString(), position, duration };
    localStorage.setItem('teletube_watch_info', JSON.stringify(info));
  } catch(e) {}
}

function getWatchInfo(videoId) {
  try {
    const info = JSON.parse(localStorage.getItem('teletube_watch_info') || '{}');
    return info[videoId];
  } catch(e) { return null; }
}

// =================== TOAST ===================
function showToast(message, type = 'default') {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  toast.innerHTML = `<span>${escapeHtml(message)}</span><button class="toast-close">${I.x}</button>`;
  toast.querySelector('.toast-close').onclick = () => removeToast(toast);
  container.appendChild(toast);
  setTimeout(() => removeToast(toast), 3000);
}

function removeToast(toast) {
  if (!toast.parentElement) return;
  toast.classList.add('removing');
  setTimeout(() => toast.remove(), 200);
}

// =================== MODAL ===================
function showModal(title, message, onConfirm, confirmText = 'Confirm', destructive = true) {
  const backdrop = document.getElementById('modal-backdrop');
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <h2>${escapeHtml(title)}</h2>
    <p>${escapeHtml(message)}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn ${destructive ? 'btn-destructive' : 'btn-primary'}" id="modal-confirm">${escapeHtml(confirmText)}</button>
    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-confirm').onclick = () => { closeModal(); onConfirm(); };
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
}

document.getElementById('modal-backdrop').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

    state.token = null;
    state.user = null;
    localStorage.removeItem('teletube_token');
  }
}

// =================== HOME PAGE ===================
async function renderHome(genre) {
  state.currentGenre = genre || 'All';
  const main = document.getElementById('main-content');

  const chipsHtml = `<div id="genre-chips-container"></div>`;
  const gridHtml = `<div id="home-grid-container"></div>`;
  const loadMoreHtml = `<div class="load-more-wrap" id="load-more-wrap"></div>`;

  main.innerHTML = chipsHtml + gridHtml + loadMoreHtml;
  renderGenreChips(document.getElementById('genre-chips-container'));

  state.videos = [];
  state.videoPage = 1;
  state.videoTotal = 0;
  state.loadingVideos = true;
  renderVideoGrid(document.getElementById('home-grid-container'), [], true);

  try {
    await fetchVideos();
    state.loadingVideos = false;
    renderVideoGrid(document.getElementById('home-grid-container'), state.videos, false);
    renderLoadMore();
  } catch(e) {
    state.loadingVideos = false;
    document.getElementById('home-grid-container').innerHTML = `
      <div class="empty-state">
        ${I.alert}
        <h2>Failed to load videos</h2>
        <p>${escapeHtml(e.message)}</p>
        <button class="btn btn-primary" onclick="location.reload()">Retry</button>
      </div>
    `;
  }
}

async function fetchVideos() {
  let url = `/api/movies?page=${state.videoPage}&limit=20`;
  if (state.currentGenre && state.currentGenre !== 'All') {
    url += `&genre=${encodeURIComponent(state.currentGenre)}`;
  }
  const data = await api(url);
  if (state.videoPage === 1) {
    state.videos = data.data;
  } else {
    state.videos.push(...data.data);
  }
  state.videoTotal = data.total;
}

function renderLoadMore() {
  const wrap = document.getElementById('load-more-wrap');
  if (!wrap) return;
  if (state.videos.length < state.videoTotal) {
    wrap.innerHTML = `<button class="btn btn-secondary" id="load-more-btn" onclick="loadMoreVideos()">Load more</button>`;
  } else {
    wrap.innerHTML = '';
  }
}

async function loadMoreVideos() {
  const btn = document.getElementById('load-more-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Loading...'; }
  state.videoPage++;
  try {
    await fetchVideos();
    renderVideoGrid(document.getElementById('home-grid-container'), state.videos, false);
    renderLoadMore();
  } catch(e) {
    state.videoPage--;
    showToast('Failed to load more videos', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Load more'; }
  }
}

  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="watch-layout" id="watch-layout">

    let recommendations = [];
    try {
      const recData = await api(recsUrl);
      recommendations = recData.data.filter(v => v.id !== videoId).slice(0, 12);

    // Check if in my list

      try {

    renderWatchContent(video, recommendations, inMyList);

    // Item 6: Specific 404 handling for deleted videos
    const isNotFound = e.message.toLowerCase().includes('not found') || e.message.toLowerCase().includes('404');

function renderWatchContent(video, recommendations, inMyList) {
  const main = document.getElementById('main-content');
  const desc = getVideoDescription(video);
  const chName = getChannelName(video);
  const chInitial = (chName || '?')[0].toUpperCase();
  const views = formatViews(video.views);
  const ago = timeAgo(video.date);
  const streamSrc = absoluteUrl(video.stream_url);
  const thumbSrc = video.thumb_url ? absoluteUrl(video.thumb_url) : '';
  const tags = video.genres || [];

  main.innerHTML = `
    <div class="watch-layout">
      <div>
        <div class="video-player-wrap">
          <video id="video-player" controls playsinline preload="auto" ${thumbSrc ? `poster="${escapeHtml(thumbSrc)}"` : ''}></video>
        </div>
        <h1 class="watch-title">${escapeHtml(video.title || 'Untitled')}</h1>
        <div class="watch-actions">
          <div class="watch-views">
            ${I.eye}
            <span>${escapeHtml(views)}${ago ? ' • ' + ago : ''}</span>
          </div>
          <div class="watch-btns">
            <button class="btn-icon-round" id="like-btn" onclick="toggleLike()">
              ${I.thumbsUp} Like
            </button>
            <button class="btn-icon-round" onclick="shareVideo()">
              ${I.share} Share
            </button>
            <button class="btn-icon-round ${inMyList ? 'active' : ''}" id="mylist-btn" onclick="toggleMyList('${video.id}')">
              ${inMyList ? I.bookmarkFilled : I.bookmark} ${inMyList ? 'Saved' : 'Save'}
            </button>
          </div>
        </div>
        <div class="channel-row">
          <div class="channel-row-left">
            <div class="channel-avatar">${escapeHtml(chInitial)}</div>
            <div>
              <div class="channel-name">${escapeHtml(chName)}</div>
              <div class="channel-meta">${escapeHtml(video.type || 'movie')}${video.file_name ? ' • ' + escapeHtml(video.file_name) : ''}</div>
            </div>
          </div>
          ${video.download_url ? `<button class="btn-icon-round" onclick="window.open('${absoluteUrl(video.download_url)}','_blank')">${I.download} Download</button>` : ''}
        </div>
        <div class="description-box">
          ${desc ? `
            <div class="description-text" id="desc-text">${escapeHtml(desc)}</div>
            <button class="desc-toggle" id="desc-toggle" onclick="toggleDesc()">Show more</button>
          ` : '<span style="color:var(--muted-foreground)">No description available.</span>'}
          ${tags.length ? `
            <div class="tag-pills">
              ${tags.map(t => `<button class="tag-pill" onclick="location.hash='#/genre/${encodeURIComponent(t)}'">${escapeHtml(t)}</button>`).join('')}
            </div>
          ` : ''}
          <div class="stream-info">
            <button class="stream-info-toggle" id="stream-info-toggle" onclick="toggleStreamInfo()">
              ${I.chevronDown} Stream source info
            </button>
            <div class="stream-info-content" id="stream-info-content">
              <div>Stream URL: <span>${escapeHtml(video.stream_url || '')}</span></div>
              <div>File ID: <span>${escapeHtml(video.file_unique_id || '')}</span></div>
              <div>Channel ID: <span>${escapeHtml(String(video.channel_id || ''))}</span></div>
              <div>Message ID: <span>${escapeHtml(String(video.message_id || ''))}</span></div>
              ${video.file_size ? `<div>File size: <span>${(video.file_size / 1e9).toFixed(2)} GB</span></div>` : ''}
              ${video.mime_type ? `<div>MIME type: <span>${escapeHtml(video.mime_type)}</span></div>` : ''}
            </div>
          </div>
        </div>
      </div>
      <div class="watch-sidebar">
        <h3>Up next</h3>
        <div id="recs-container">
          ${recommendations.length ? recommendations.map(v => {
            const rDesc = getVideoDescription(v);
            const rCh = getChannelName(v);
            const rDur = formatDuration(v.duration);
            const rViews = formatViews(v.views);
            const rAgo = timeAgo(v.date);
            const rThumb = v.thumb_url ? absoluteUrl(v.thumb_url) : '';
            return `
              <div class="recommendation-item" onclick="location.hash='#/watch/${v.id}'">
                <div class="rec-thumb">
                  ${rThumb ? `<img src="${escapeHtml(rThumb)}" alt="${escapeHtml(v.title)}" loading="lazy" onerror="handleImgError(this)" />` : ''}
                  ${rDur !== '0:00' ? `<div class="duration-badge">${rDur}</div>` : ''}
                </div>
                <div class="rec-text">
                  <div class="rec-title">${escapeHtml(v.title || 'Untitled')}</div>
                  <div class="rec-channel">${escapeHtml(rCh)}</div>
                  <div class="rec-info">${escapeHtml(rViews)}${rAgo ? ' • ' + escapeHtml(rAgo) : ''}</div>
                </div>
              </div>

        </div>
      </div>
    </div>

  // Set up video player
  const videoEl = document.getElementById('video-player');
  let lastHistoryUpdate = 0;
  let errorShown = false;

  // ✅ FIX: Set src directly and load, mimicking NexStream's working approach
  if (videoEl && streamSrc) {
    videoEl.src = streamSrc;
    videoEl.load();
    videoEl.play().catch(e => console.warn("Autoplay prevented or error:", e));
  } else {
    // Handle missing stream URL gracefully
    const wrap = document.querySelector('.video-player-wrap');
    if (wrap) {
      wrap.innerHTML = `
        <div class="player-error">
          ${I.alert}
          <div>
            <p style="font-size:1rem;font-weight:600;color:var(--foreground);margin-bottom:0.5rem;">Stream unavailable</p>
            <p style="font-size:0.8125rem;">No stream URL provided for this video.</p>
          </div>
        </div>
      `;
    }
  }

  videoEl.addEventListener('timeupdate', () => {
    const now = Date.now();
    if (now - lastHistoryUpdate >= 10000 && state.token) {
      lastHistoryUpdate = now;
      api(`/api/user/history/${video.id}`, { method: 'POST' }).catch(() => {});
      saveWatchInfo(video.id, videoEl.currentTime, videoEl.duration || video.duration || 0);
    } else if (!state.token && now - lastHistoryUpdate >= 10000) {
      lastHistoryUpdate = now;
      saveWatchInfo(video.id, videoEl.currentTime, videoEl.duration || video.duration || 0);
    }
  });

  // ── Fix 10: Real MediaError + stall detection ──────────────────
  videoEl.addEventListener('error', () => {
    if (errorShown) return;
    errorShown = true;
    const err = videoEl.error;
    const codeNames = {1:'ABORTED', 2:'NETWORK', 3:'DECODE', 4:'SRC_NOT_SUPPORTED'};
    console.error('Video playback error:', err ? `${codeNames[err.code]||err.code}: ${err.message}` : 'unknown');
    const wrap = videoEl.parentElement;
    wrap.innerHTML = `
      <div class="player-error">
        ${I.alert}
        <div>
          <p style="font-size:1rem;font-weight:600;color:var(--foreground);margin-bottom:0.5rem;">Unable to play this video in the browser.</p>
          <p style="font-size:0.8125rem;">${err && err.code === 2 ? 'Network issue while loading the stream.' : 'The format may not be supported.'} Try downloading instead.</p>
        </div>
        ${video.download_url ? `<button class="btn btn-primary" onclick="window.open('${absoluteUrl(video.download_url)}','_blank')">${I.download} Download Video</button>` : ''}
      </div>`;
  });

  let stallTimer = null;
  const clearStallTimer = () => { if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; } };
  videoEl.addEventListener('waiting', () => {
    clearStallTimer();
    stallTimer = setTimeout(() => {
      if (!errorShown) showToast('Still loading — the stream may be slow. Try downloading if this persists.', 'error');
    }, 15000);
  });

  // Item 3: Audio-only / missing video track detection
  videoEl.addEventListener('playing', () => {
    clearStallTimer();
    if (videoEl.videoWidth === 0 || videoEl.videoHeight === 0) {
      if (!errorShown) {
        errorShown = true;
        videoEl.pause();
        const wrap = videoEl.parentElement;
        wrap.innerHTML = `
          <div class="player-error">
            ${I.alert}
            <div>
              <p style="font-size:1rem;font-weight:600;color:var(--foreground);margin-bottom:0.5rem;">Video track unavailable.</p>
              <p style="font-size:0.8125rem;">This media is audio-only or uses a codec unsupported by the browser. Try VLC or download.</p>
            </div>
            <div style="display:flex; gap:0.5rem;">
              ${video.vlc_url ? `<button class="btn btn-primary" onclick="window.open('${absoluteUrl(video.vlc_url)}','_blank')">Open in VLC</button>` : ''}
              ${video.download_url ? `<button class="btn btn-secondary" onclick="window.open('${absoluteUrl(video.download_url)}','_blank')">${I.download} Download</button>` : ''}
            </div>
          </div>`;
      }
    }
  });

  // Pre-fill search input
  const searchInput = document.getElementById('header-search-input');
  if (searchInput) searchInput.value = '';
}

function toggleLike() {
  const btn = document.getElementById('like-btn');
  btn.classList.toggle('active');
  showToast(btn.classList.contains('active') ? 'Liked!' : 'Unliked');
}

function shareVideo() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied to clipboard');
    }).catch(() => {
      fallbackCopy(url);
    });
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('Link copied to clipboard'); } catch(e) { showToast('Failed to copy link', 'error'); }

        <button class="btn btn-destructive-text" id="clear-history-btn">${I.trash} Clear all</button>
      </div>
      <div id="history-list">
        ${Array(5).fill(0).map(() => `
          <div style="display:flex;gap:1rem;padding:0.5rem;">
            <div class="skeleton" style="width:240px;aspect-ratio:16/9;border-radius:0.5rem;"></div>
            <div style="flex:1;">
              <div class="skeleton" style="height:1rem;width:60%;margin-bottom:0.5rem;border-radius:0.25rem;"></div>
              <div class="skeleton" style="height:0.75rem;width:40%;border-radius:0.25rem;"></div>

          </div>

  `;

    showModal('Clear watch history?', 'This will remove all videos from your watch history. This action cannot be undone.', async () => {
      try {
        await api('/api/user/history', { method: 'DELETE' });
        localStorage.removeItem('teletube_watch_info');
        showToast('History cleared');
        renderHistory();
      } catch(e) {
        showToast('Failed to clear history', 'error');
      }
    }, 'Clear all');
  };

  try {
    const history = await api('/api/user/history');
    const container = document.getElementById('history-list');

      container.innerHTML = `
        <div class="empty-state">
          ${I.clock}
          <h2>No watch history yet</h2>
          <p>Videos you watch will appear here.</p>
          <button class="btn btn-primary" onclick="location.hash='#/'">Browse videos</button>
        </div>
      `;
      return;
    }

    container.innerHTML = `<div class="list-items">${history.map(v => {
      const chName = getChannelName(v);
      const dur = formatDuration(v.duration);
      const thumb = v.thumb_url ? absoluteUrl(v.thumb_url) : '';
      const watchInfo = getWatchInfo(v.id);
      const progress = watchInfo && watchInfo.duration ? (watchInfo.position / watchInfo.duration) * 100 : 0;
      const watchTime = watchInfo ? timeAgo(watchInfo.time) : '';
      const watchPos = watchInfo && watchInfo.position ? formatDuration(watchInfo.position) : '';
      const infoText = [watchTime ? `Watched ${watchTime}` : '', watchPos ? `${watchPos} in` : ''].filter(Boolean).join(' • ');

      return `
        <div class="list-item">
          <div class="list-item-thumb" onclick="location.hash='#/watch/${v.id}'">
            ${thumb ? `<img src="${escapeHtml(thumb)}" alt="${escapeHtml(v.title)}" loading="lazy" onerror="handleImgError(this)" />` : ''}
            ${dur !== '0:00' ? `<div class="duration-badge">${dur}</div>` : ''}
            ${progress > 0 ? `<div class="progress-bar" style="width:${Math.min(100, progress)}%"></div>` : ''}
          </div>
          <div class="list-item-text">
            <div class="list-item-title" onclick="location.hash='#/watch/${v.id}'">${escapeHtml(v.title || 'Untitled')}</div>
            <div class="list-item-channel">${escapeHtml(chName)}</div>
            ${infoText ? `<div class="list-item-info">${escapeHtml(infoText)}</div>` : ''}
          </div>
          <button class="list-item-remove" onclick="removeFromHistory('${v.id}', this)">${I.trash}</button>
        </div>
      `;
    }).join('')}</div>`;
  } catch(e) {
    document.getElementById('history-list').innerHTML = `
      <div class="empty-state">
        ${I.alert}
        <h2>Failed to load history</h2>
        <p>${escapeHtml(e.message)}</p>
        <button class="btn btn-primary" onclick="location.hash='#/'">Back to home</button>
      </div>
    `;
  }
}

async function removeFromHistory(videoId, btn) {
  // Note: server doesn't have a DELETE endpoint for individual history items
  // The DELETE /api/user/history clears all. For individual removal,
  // we'll use optimistic UI and just remove from display.
  const item = btn.closest('.list-item');
  item.style.opacity = '0.5';
  item.style.transition = 'opacity 200ms ease';
  setTimeout(() => {
    item.remove();
    // Check if empty
    const container = document.getElementById('history-list');
    if (!container.querySelector('.list-item')) {
      container.innerHTML = `
        <div class="empty-state">
          ${I.clock}
          <h2>No watch history yet</h2>
          <p>Videos you watch will appear here.</p>
          <button class="btn btn-primary" onclick="location.hash='#/'">Browse videos</button>
        </div>
      `;
    }
  }, 200);
  showToast('Removed from history');
  // Note: The API doesn't support individual history item deletion.
  // The video will reappear in history if watched again.
}

async function renderSearch(query) {
  const main = document.getElementById('main-content');

  if (!query) {
    main.innerHTML = `
      <div class="search-page">
        <div class="search-header"><h1>Search</h1></div>
        <div class="empty-state">
          ${I.search}
          <h2>Type to search</h2>
          <p>Use the search bar above to find videos.</p>
        </div>
      </div>
    `;
    return;
  }

  main.innerHTML = `
    <div class="search-page">
      <div class="search-header"><h1>Search results for "<span>${escapeHtml(query)}</span>"</h1></div>
      <div id="search-results">${Array(8).fill(0).map(() => skeletonCardHTML()).join('')}</div>
      <div class="load-more-wrap" id="search-load-more"></div>
    </div>
  `;

  // Wrap skeleton cards in grid
  document.getElementById('search-results').innerHTML = `<div class="video-grid">${Array(8).fill(0).map(() => skeletonCardHTML()).join('')}</div>`;

  try {
    state.searchQuery = query;
    state.searchPage = 1;
    const data = await api(`/api/search?q=${encodeURIComponent(query)}&page=1&limit=20`);
    state.searchResults = data.data;
    state.searchTotal = data.total;

    const container = document.getElementById('search-results');

    if (state.searchResults.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          ${I.search}
          <h2>No results found</h2>
          <p>Try a different search term.</p>
        </div>
      `;
    } else {
      container.innerHTML = `<p style="font-size:0.875rem;color:var(--muted-foreground);margin-bottom:1rem;">${state.searchTotal} result${state.searchTotal !== 1 ? 's' : ''}</p>`;
      container.innerHTML += `<div class="video-grid">${state.searchResults.map(v => videoCardHTML(v)).join('')}</div>`;

      if (state.searchResults.length < state.searchTotal) {
        document.getElementById('search-load-more').innerHTML = `<button class="btn btn-secondary" onclick="loadMoreSearch()">Load more</button>`;
      }
    }
  } catch(e) {
    document.getElementById('search-results').innerHTML = `
      <div class="empty-state">
        ${I.alert}
        <h2>Search failed</h2>
        <p>${escapeHtml(e.message)}</p>
      </div>
    `;
  }
}

async function loadMoreSearch() {
  const btn = document.querySelector('#search-load-more button');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Loading...'; }
  state.searchPage++;
  try {
    const data = await api(`/api/search?q=${encodeURIComponent(state.searchQuery)}&page=${state.searchPage}&limit=20`);
    state.searchResults.push(...data.data);
    const container = document.getElementById('search-results');
    container.innerHTML = `<p style="font-size:0.875rem;color:var(--muted-foreground);margin-bottom:1rem;">${state.searchTotal} result${state.searchTotal !== 1 ? 's' : ''}</p>`;
    container.innerHTML += `<div class="video-grid">${state.searchResults.map(v => videoCardHTML(v)).join('')}</div>`;
    if (state.searchResults.length < state.searchTotal) {
      document.getElementById('search-load-more').innerHTML = `<button class="btn btn-secondary" onclick="loadMoreSearch()">Load more</button>`;
    } else {
      document.getElementById('search-load-more').innerHTML = '';
    }
  } catch(e) {
    state.searchPage--;
    showToast('Failed to load more', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Load more'; }
  }
}

// =================== ROUTER ===================
function router() {
  const hash = location.hash || '#/';
  const [path, queryString] = hash.slice(1).split('?');
  const segments = path.split('/').filter(Boolean);

  let route = 'home';
  let params = {};

  if (segments.length === 0) {
    route = 'home';
    params.genre = 'All';
  } else if (segments[0] === 'genre' && segments[1]) {
    route = 'home';
    params.genre = decodeURIComponent(segments[1]);
  } else if (segments[0] === 'watch' && segments[1]) {
    route = 'watch';
    params.id = segments[1];
  } else if (segments[0] === 'login') {
    route = 'login';
  } else if (segments[0] === 'signup') {
    route = 'signup';
  } else if (segments[0] === 'history') {
    route = 'history';
  } else if (segments[0] === 'mylist') {
    route = 'mylist';
  } else if (segments[0] === 'search') {
    route = 'search';
    const q = new URLSearchParams(queryString || '').get('q');
    params.q = q || '';
  } else {
    route = 'home';
    params.genre = 'All';
  }

  // Handle auth pages
  const isAuthPage = route === 'login' || route === 'signup';
  document.body.classList.toggle('auth-page', isAuthPage);
  closeMobileSidebar();
  closeDropdown();
  window.scrollTo(0, 0);

  // Render sidebar state
  renderSidebar();

  // Pre-fill search input
  const searchInput = document.getElementById('header-search-input');
  if (searchInput) {
    if (route === 'search' && params.q) {
      searchInput.value = params.q;
    } else {
      searchInput.value = '';
    }
  }

  // Route to page
  switch(route) {
    case 'home': renderHome(params.genre); break;
    case 'watch': renderWatch(params.id); break;
    case 'login': renderLogin(); break;
    case 'signup': renderSignup(); break;
    case 'history': renderHistory(); break;
    case 'mylist': renderMyList(); break;
    case 'search': renderSearch(params.q); break;
    default: renderHome('All');
  }
}

// =================== INIT ===================
async function init() {
  renderAppShell();
  await checkAuth();
  renderHeader();
  window.addEventListener('hashchange', router);
  window.addEventListener('resize', () => {
    if (window.innerWidth >= 1024) {
      closeMobileSidebar();
    }
  });
  router();
}

init();
